name: 功能请求
description: 提议新功能或新 Provider 支持
title: "[FEATURE] "
labels: [feature, needs-triage]
body:
  - type: checkboxes
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过已有 issue，没有类似请求
          required: true
  - type: textarea
    attributes:
      label: 问题背景
      description: 解决什么问题？什么场景？
    validations:
      required: true
  - type: textarea
    attributes:
      label: 方案描述
      description: 期望的 API 是什么样的？
      render: go
  - type: textarea
    attributes:
      label: 替代方案
      description: 目前有什么变通手段？
  - type: checkboxes
    attributes:
      label: 兼容性
      options:
        - label: 非破坏性变更（向后兼容）
        - label: 破坏性变更（需要主版本升级）
  - type: textarea
    attributes:
      label: 补充信息
